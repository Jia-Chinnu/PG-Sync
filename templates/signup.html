<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | PG Sync Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --primary: #008730;
            --primary-glow: rgba(0, 135, 48, 0.1);
            --error: #ff3333;
            --success: #008730;
            --dark: #0F172A;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #ffffff; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* --- PARALLAX BACKGROUND --- */
        .parallax-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .glow-mesh { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 135, 48, 0.08) 0%, transparent 70%); border-radius: 50%; top: -10%; left: -10%; animation: drift 15s infinite alternate ease-in-out; }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(-100px, 50px); } }
        .geo-element { position: absolute; border: 1.5px solid var(--primary-glow); border-radius: 10px; transition: transform 0.2s ease-out; }
        .geo-1 { width: 300px; height: 300px; border-radius: 50%; top: 5%; left: -5%; border-width: 25px; }
        .geo-2 { width: 150px; height: 150px; top: 70%; right: 10%; transform: rotate(45deg); border-width: 10px; border-style: dashed; }

        /* --- SIGNUP CARD --- */
        .signup-card {
            width: 480px; background: var(--glass); backdrop-filter: blur(20px);
            padding: 50px 45px; border-radius: 45px;
            border: 1px solid rgba(0, 135, 48, 0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.06);
            text-align: center; z-index: 10;
        }

        /* --- TECH SCANNER --- */
        .tech-portal { width: 110px; height: 110px; margin: 0 auto 30px; position: relative; display: flex; align-items: center; justify-content: center; }
        .dotted-orbit { position: absolute; width: 100%; height: 100%; border: 2px dotted var(--primary); border-radius: 50%; animation: rotateOrbit 10s linear infinite; }
        @keyframes rotateOrbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .inner-hub { width: 80px; height: 80px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px var(--primary-glow); border: 2px solid #f1f5f9; }
        .inner-hub i { font-size: 35px; color: var(--primary); }

        h2 { font-size: 26px; font-weight: 800; color: var(--dark); margin-bottom: 25px; }

        /* --- FORM --- */
        .form-group { margin-bottom: 18px; position: relative; text-align: left; }
        .form-group i { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 17px; }
        input, select {
            width: 100%; padding: 16px 20px 16px 60px;
            border-radius: 14px; border: 1px solid #E2E8F0;
            background: #F8FAFC; outline: none; transition: 0.4s;
            font-size: 14px; font-weight: 500;
        }
        input:focus, select:focus { border-color: var(--primary); background: #fff; box-shadow: 0 10px 25px var(--primary-glow); }

        .btn-hub { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.4s; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .btn-hub:hover { background: var(--dark); transform: translateY(-3px); }

        /* --- MODAL POPUPS --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .hub-modal { background: white; width: 380px; padding: 40px; border-radius: 35px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.25); animation: glitchPop 0.4s ease-out; }
        @keyframes glitchPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .modal-error { border: 2px solid var(--error); }
        .modal-success { border: 2px solid var(--success); }
        
        .modal-icon { font-size: 55px; margin-bottom: 20px; }
        .btn-close { background: var(--dark); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s; }

        #residentIdGroup { display: none; }
    </style>
</head>
<body>

    <div class="parallax-bg">
        <div class="glow-mesh"></div>
        <div class="geo-element geo-1" data-speed="0.1"></div>
        <div class="geo-element geo-2" data-speed="-0.2"></div>
    </div>

    <div class="modal-overlay" id="statusModal">
        <div class="hub-modal" id="modalBox">
            <div class="modal-icon" id="modalIcon"></div>
            <h3 id="modalTitle">System Status</h3>
            <p id="modalMsg" style="margin: 15px 0 25px; color: #64748B;"></p>
            <button class="btn-close" id="modalBtn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <div class="signup-card">
        <div class="tech-portal">
            <div class="dotted-orbit"></div>
            <div class="inner-hub"><i class="fa-solid fa-user-plus"></i></div>
        </div>

        <h2>Initialize Hub</h2>

        <form action="/signup" method="POST">
            <div class="form-group">
                <i class="fa-solid fa-id-badge"></i>
                <input type="text" name="name" placeholder="Full Identity Name" required>
            </div>
            
            <div class="form-group">
                <i class="fa-solid fa-at"></i>
                <input type="email" name="email" placeholder="Email Address" required>
            </div>

            <div class="form-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" name="password" placeholder="Secure Access Key" required>
            </div>

            <div class="form-group">
                <i class="fa-solid fa-users-gear"></i>
                <select name="role" id="roleSelect" onchange="toggleResidentField()" required>
                    <option value="" disabled selected>System Role</option>
                    <option value="owner">Hub Owner</option>
                    <option value="resident">Resident</option>
                </select>
            </div>

            <div class="form-group" id="residentIdGroup">
                <i class="fa-solid fa-fingerprint"></i>
                <input type="text" name="resident_id" placeholder="Owner-Assigned Resident ID">
            </div>

            <button type="submit" class="btn-hub">Create Account</button>
        </form>

        <p style="margin-top: 25px; font-size: 13px;">
            Already verified? <a href="/login" style="color:var(--primary); text-decoration: none; font-weight: 700;">Login here</a>
        </p>
    </div>

    <script>
        // Parallax Move
        document.addEventListener('mousemove', (e) => {
            const shapes = document.querySelectorAll('.geo-element');
            const x = (window.innerWidth / 2 - e.pageX);
            const y = (window.innerHeight / 2 - e.pageY);
            shapes.forEach(shape => {
                const speed = shape.getAttribute('data-speed');
                shape.style.transform = `translate(${x * speed}px, ${y * speed}px) rotate(${x * speed * 0.1}deg)`;
            });
        });

        function toggleResidentField() {
            const role = document.getElementById('roleSelect').value;
            document.getElementById('residentIdGroup').style.display = (role === 'resident') ? 'block' : 'none';
        }

        function closeModal() {
            document.getElementById('statusModal').style.display = 'none';
            // Redirect to login if success
            if(document.getElementById('modalBox').classList.contains('modal-success')){
                window.location.href = "/login";
            }
        }

        // --- FLASK FLASH TRIGGER ---
        window.addEventListener('load', function() {
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        showHubStatus("{{ category }}", "{{ message }}");
                    {% endfor %}
                {% endif %}
            {% endwith %}
        });

        function showHubStatus(category, msg) {
            const modal = document.getElementById('statusModal');
            const box = document.getElementById('modalBox');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const message = document.getElementById('modalMsg');
            const btn = document.getElementById('modalBtn');

            modal.style.display = 'flex';
            message.innerText = msg;

            if (category === 'error') {
                box.className = 'hub-modal modal-error';
                icon.innerHTML = '<i class="fa-solid fa-circle-exclamation" style="color:#ff3333"></i>';
                title.innerText = 'Sync Error';
                btn.innerText = 'Try Again';
            } else {
                box.className = 'hub-modal modal-success';
                icon.innerHTML = '<i class="fa-solid fa-circle-check" style="color:#008730"></i>';
                title.innerText = 'Hub Created';
                btn.innerText = 'Go to Login';
            }
        }
    </script>
</body>
</html>
